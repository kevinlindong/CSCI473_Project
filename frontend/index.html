<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scholar</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" />
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-diag" style="display:none;position:fixed;inset:0;z-index:99999;background:#F5F2EA;color:#264635;font:14px ui-monospace,monospace;padding:24px;overflow:auto;">
      <div id="boot-status"></div>
      <pre id="boot-errors" style="white-space:pre-wrap;color:#C85544;margin-top:12px;"></pre>
    </div>
    <script>
      (function () {
        var diag = document.getElementById('boot-diag');
        var errBox = document.getElementById('boot-errors');
        var status = document.getElementById('boot-status');
        var mounted = false;
        function show(msg) { diag.style.display = 'block'; status.textContent = msg; }
        window.addEventListener('error', function (e) {
          show('❌ boot: script error');
          errBox.textContent += '\n' + (e.error && e.error.stack ? e.error.stack : (e.message + ' @ ' + e.filename + ':' + e.lineno));
        });
        window.addEventListener('unhandledrejection', function (e) {
          show('❌ boot: unhandled rejection');
          errBox.textContent += '\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
        });
        var root = document.getElementById('root');
        var mo = new MutationObserver(function () {
          if (root.children.length > 0) {
            mounted = true;
            mo.disconnect();
            diag.remove();
          }
        });
        mo.observe(root, { childList: true });
        setTimeout(function () {
          if (mounted || root.children.length > 0) return;
          if (!errBox.textContent) {
            show('⚠ boot: root is still empty after 6s. No JS errors caught. Check Network tab for failed imports.');
          }
        }, 6000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
